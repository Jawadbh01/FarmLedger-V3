<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FarmLedger V3 — Farmer</title>
  <meta name="theme-color" content="#080d08"/>
  <link rel="manifest" href="../manifest.json"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">🌾</div>
      <div><div class="sidebar-brand-name">FarmLedger <span class="sidebar-brand-ver">V3</span></div></div>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebarAvatar">F</div>
      <div><div class="sidebar-user-name" id="sidebarName">Farmer</div><div class="sidebar-user-role">👨‍🌾 Kisan</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">My Records</div>
      <button class="nav-item active" data-tab="overview"><span class="nav-icon">📊</span>My Overview</button>
      <button class="nav-item" data-tab="debts"><span class="nav-icon">💸</span>My Debts</button>
      <button class="nav-item" data-tab="harvests"><span class="nav-icon">🌾</span>My Harvests</button>
    </nav>
    <div class="sidebar-footer">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin-bottom:6px">
        <span style="font-size:12px;color:var(--muted)">Theme</span>
        <button id="themeToggle" style="background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;font-family:var(--font)">☀️ Light</button>
      </div>
      <button class="sidebar-logout" id="logoutBtn">🚪 Logout</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="offline-banner" id="offlineBanner">📵 Offline</div>
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <div><div class="page-title" id="pageTitle">My Overview</div><div class="page-sub">Farmer Portal — کاشتکار پورٹل</div></div>
      </div>
      <div class="topbar-right">
        <div class="online-dot" id="onlineDot">Online</div>
        <button class="btn btn-sm btn-outline" onclick="printMyReport()">🖨️ Print</button>
      </div>
    </header>
    <div class="content">
      <div id="pageLoader" class="page-loader"><div class="spinner"></div><div class="loader-text">Loading your records...</div></div>
      <div id="appContent" class="hidden">

        <!-- OVERVIEW -->
        <div data-tab-content="overview">
          <div class="content-header">
            <div><div class="content-title" id="farmerTitle">My Records 👨‍🌾</div><div class="content-sub" id="farmerSub">Your farm summary</div></div>
          </div>
          <div class="stats-grid" id="statsGrid"></div>
          <div class="grid-2">
            <div class="card">
              <div class="card-header"><div class="card-title">🌱 My Land</div></div>
              <div class="card-body" id="myLandInfo"></div>
            </div>
            <div class="card">
              <div class="card-header"><div class="card-title">💰 Payment Summary</div></div>
              <div class="card-body" id="paymentSummary"></div>
            </div>
          </div>
        </div>

        <!-- DEBTS -->
        <div data-tab-content="debts" class="hidden">
          <div class="content-header">
            <div><div class="content-title">💸 My Debts — میرا اُدھار</div><div class="content-sub">Items taken — charged to you</div></div>
          </div>
          <div class="card" style="margin-bottom:14px"><div class="card-body" id="debtSummaryBox"></div></div>
          <div class="card">
            <div class="table-wrap">
              <table><thead><tr><th>Date</th><th>Item</th><th>Qty</th><th>Amount</th><th>Notes</th></tr></thead><tbody id="debtsBody"></tbody></table>
            </div>
          </div>
        </div>

        <!-- HARVESTS -->
        <div data-tab-content="harvests" class="hidden">
          <div class="content-header">
            <div><div class="content-title">🌾 My Harvests — میری فصل</div></div>
          </div>
          <div id="harvestCards"></div>
        </div>

      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyDpTPibk-7_kqyJdfN94KrLlcKkoNnqIYE",authDomain:"farmledger-e85e3.firebaseapp.com",projectId:"farmledger-e85e3",storageBucket:"farmledger-e85e3.firebasestorage.app",messagingSenderId:"922324809308",appId:"1:922324809308:web:05c015ce12e55034e99899"});
const auth=getAuth(app),db=getFirestore(app);

let ME=null,myRecord=null,myLand=null,myActs=[],myHarvests=[];

const t=localStorage.getItem('fl_theme')||'dark';
document.documentElement.setAttribute('data-theme',t);
const tBtn=document.getElementById('themeToggle');
tBtn.textContent=t==='dark'?'☀️ Light':'🌙 Dark';
tBtn.addEventListener('click',()=>{const n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('fl_theme',n);tBtn.textContent=n==='dark'?'☀️ Light':'🌙 Dark';});

function toast(msg,type='success'){const c=document.getElementById('toast-container'),t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<span>${{success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'}[type]||'✅'}</span><span>${msg}</span>`;c.appendChild(t);requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),400);},3500);}
function fmt(n){return '₨'+Number(n||0).toLocaleString();}
function fmtDate(d){if(!d)return '—';return new Date(d).toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'});}

function updateOnline(){const on=navigator.onLine,el=document.getElementById('onlineDot'),bn=document.getElementById('offlineBanner');if(el){el.className=`online-dot${on?'':' offline'}`;el.textContent=on?'Online':'Offline';}if(bn)bn.classList.toggle('show',!on);}
window.addEventListener('online',updateOnline);window.addEventListener('offline',updateOnline);updateOnline();

const tog=document.getElementById('menuToggle'),sb=document.getElementById('sidebar'),ov=document.getElementById('sidebarOverlay');
tog?.addEventListener('click',()=>{sb.classList.toggle('open');ov.classList.toggle('show');});
ov?.addEventListener('click',()=>{sb.classList.remove('open');ov.classList.remove('show');});

window.switchTab=function(tab){
  document.querySelectorAll('.nav-item[data-tab]').forEach(i=>i.classList.toggle('active',i.dataset.tab===tab));
  document.querySelectorAll('[data-tab-content]').forEach(c=>c.classList.toggle('hidden',c.dataset.tabContent!==tab));
  const titles={overview:'My Overview',debts:'My Debts',harvests:'My Harvests'};
  document.getElementById('pageTitle').textContent=titles[tab]||tab;
  sb.classList.remove('open');ov.classList.remove('show');
};
document.querySelectorAll('.nav-item[data-tab]').forEach(i=>i.addEventListener('click',()=>switchTab(i.dataset.tab)));

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='../index.html';return;}
  try{
    const snap=await getDoc(doc(db,'users',user.uid));
    if(!snap.exists()||snap.data().role!=='farmer'){window.location.href='../index.html';return;}
    ME={uid:user.uid,...snap.data()};
    document.getElementById('sidebarName').textContent=ME.name||'Farmer';
    document.getElementById('sidebarAvatar').textContent=(ME.name||'F').charAt(0).toUpperCase();
    await loadAll();
    document.getElementById('pageLoader').classList.add('hidden');
    document.getElementById('appContent').classList.remove('hidden');
  }catch(e){document.getElementById('pageLoader').innerHTML=`<div style="color:var(--danger);text-align:center;padding:20px">❌ ${e.message}</div>`;}
});

async function loadAll(){
  const fid=ME.userId;
  const [fSnap,aS,hS]=await Promise.all([
    getDocs(query(collection(db,'farmers'),where('farmerId','==',fid))),
    getDocs(query(collection(db,'activities'),where('farmerId','==',fid))),
    getDocs(query(collection(db,'harvests'),where('farmerId','==',fid)))
  ]);
  myRecord=fSnap.docs[0]?{id:fSnap.docs[0].id,...fSnap.docs[0].data()}:null;
  myActs=aS.docs.map(d=>({id:d.id,...d.data()}));
  myHarvests=hS.docs.map(d=>({id:d.id,...d.data()}));
  if(myRecord?.landId){
    const lSnap=await getDocs(query(collection(db,'farms'),where('landId','==',myRecord.landId)));
    myLand=lSnap.docs[0]?{id:lSnap.docs[0].id,...lSnap.docs[0].data()}:null;
  }
  document.getElementById('farmerTitle').textContent=`${ME.name} 👨‍🌾`;
  document.getElementById('farmerSub').textContent=myLand?`${myLand.name} — ${myLand.crop||'No crop'} • ${myLand.acres||'?'} acres`:'No land assigned';
  renderOverview();renderDebts();renderHarvests();
}

function renderOverview(){
  const myDebts=myActs.filter(a=>a.chargedTo==='farmer');
  const totalDebt=myDebts.reduce((s,a)=>s+Number(a.amount||0),0);
  const totalDeducted=myHarvests.reduce((s,h)=>s+Number(h.farmerDeductedDebt||0),0);
  const netDebt=totalDebt-totalDeducted;
  const totalEarned=myHarvests.reduce((s,h)=>s+Number(h.farmerNetPayment||0),0);
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-icon">🌱</div><div class="stat-label">My Land</div><div class="stat-value" style="font-size:16px">${myLand?.name||'—'}</div></div>
    <div class="stat-card"><div class="stat-icon">🌾</div><div class="stat-label">Harvests</div><div class="stat-value">${myHarvests.length}</div></div>
    <div class="stat-card"><div class="stat-icon">💸</div><div class="stat-label">Current Debt</div><div class="stat-value" style="font-size:18px;color:${netDebt>0?'var(--danger)':'var(--primary)'}">${fmt(netDebt)}</div></div>
    <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-label">Total Earned</div><div class="stat-value" style="font-size:18px;color:var(--primary)">${fmt(totalEarned)}</div></div>`;

  document.getElementById('myLandInfo').innerHTML=myLand?`
    <div class="info-row"><span class="lbl">Land Name</span><span class="val">${myLand.name}</span></div>
    <div class="info-row"><span class="lbl">Crop</span><span class="val">${myLand.crop||'—'}</span></div>
    <div class="info-row"><span class="lbl">Acres</span><span class="val">${myLand.acres||'—'}</span></div>
    <div class="info-row"><span class="lbl">Location</span><span class="val">${myLand.location||'—'}</span></div>
    <div class="info-row"><span class="lbl">My Role</span><span class="val"><span class="badge ${myRecord?.type==='main'?'badge-gold':'badge-blue'}">${myRecord?.type==='main'?'Main Farmer':'Partner'}</span></span></div>`
    :'<div class="empty-state"><div class="empty-icon">🌱</div><div class="empty-title">No land assigned yet</div></div>';

  const lastHarv=myHarvests.sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  document.getElementById('paymentSummary').innerHTML=lastHarv?`
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:12px">LATEST HARVEST — آخری فصل</div>
    <div class="info-row"><span class="lbl">Crop</span><span class="val">${lastHarv.crop}</span></div>
    <div class="info-row"><span class="lbl">Date</span><span class="val">${fmtDate(lastHarv.date)}</span></div>
    <div class="info-row"><span class="lbl">Total Income</span><span class="val" style="color:var(--primary)">${fmt(lastHarv.totalIncome)}</span></div>
    <div class="info-row"><span class="lbl">My Share (50%)</span><span class="val" style="color:var(--primary)">${fmt(lastHarv.farmerShare)}</span></div>
    <div class="info-row"><span class="lbl">Debt Deducted</span><span class="val" style="color:var(--danger)">-${fmt(lastHarv.farmerDeductedDebt)}</span></div>
    <div class="info-row" style="border-bottom:none"><span class="lbl fw-bold">Net Payment</span><span class="val" style="font-size:18px;color:${lastHarv.farmerNetPayment>=0?'var(--primary)':'var(--danger)'}">${fmt(lastHarv.farmerNetPayment)}</span></div>`
    :'<div class="empty-state"><div class="empty-icon">🌾</div><div class="empty-title">No harvests yet</div></div>';
}

function renderDebts(){
  const debts=myActs.filter(a=>a.chargedTo==='farmer').sort((a,b)=>new Date(b.date)-new Date(a.date));
  const total=debts.reduce((s,a)=>s+Number(a.amount||0),0);
  const deducted=myHarvests.reduce((s,h)=>s+Number(h.farmerDeductedDebt||0),0);
  const remaining=Math.max(0,total-deducted);
  document.getElementById('debtSummaryBox').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div style="text-align:center;padding:12px;background:var(--bg2);border-radius:var(--radius-sm)"><div style="font-size:10px;color:var(--muted);font-weight:700">TOTAL DEBT</div><div style="font-size:16px;font-weight:800;color:var(--danger)">${fmt(total)}</div></div>
      <div style="text-align:center;padding:12px;background:var(--bg2);border-radius:var(--radius-sm)"><div style="font-size:10px;color:var(--muted);font-weight:700">DEDUCTED</div><div style="font-size:16px;font-weight:800;color:var(--primary)">${fmt(deducted)}</div></div>
      <div style="text-align:center;padding:12px;background:var(--bg2);border-radius:var(--radius-sm)"><div style="font-size:10px;color:var(--muted);font-weight:700">REMAINING</div><div style="font-size:16px;font-weight:800;color:${remaining>0?'var(--danger)':'var(--primary)'}">${fmt(remaining)}</div></div>
    </div>`;
  const IC={diesel:'⛽',fertilizer:'🧪',seeds:'🌱',labor:'👷',pesticide:'💊',tractor:'🚜',water:'💧',other:'📦'};
  document.getElementById('debtsBody').innerHTML=debts.length===0
    ?'<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--muted)">No debts — آپ کا کوئی اُدھار نہیں</td></tr>'
    :debts.map(a=>`<tr>
        <td class="text-sm">${fmtDate(a.date)}</td>
        <td><span class="badge badge-blue">${IC[a.type]||'📦'} ${a.type}</span></td>
        <td class="text-sm">${a.quantity||'—'} ${a.unit||''}</td>
        <td style="font-weight:800;color:var(--danger)">${fmt(a.amount)}</td>
        <td class="text-sm text-muted">${a.notes||'—'}</td>
      </tr>`).join('');
}

function renderHarvests(){
  document.getElementById('harvestCards').innerHTML=myHarvests.length===0
    ?'<div class="empty-state"><div class="empty-icon">🌾</div><div class="empty-title">No harvests yet</div><div class="empty-sub">Your harvest records will appear here</div></div>'
    :myHarvests.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(h=>`
      <div class="card" style="margin-bottom:12px"><div class="card-body">
        <div style="display:flex;justify-content:space-between;margin-bottom:12px">
          <div><div style="font-size:16px;font-weight:800">🌾 ${h.crop}</div><div style="font-size:12px;color:var(--muted)">${fmtDate(h.date)} • ${h.season||'—'}</div></div>
          <span class="badge badge-green">${h.harvId||'—'}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
          <div style="background:var(--bg2);border-radius:var(--radius-sm);padding:10px;text-align:center"><div style="font-size:10px;color:var(--muted);font-weight:700">MY SHARE (50%)</div><div style="font-weight:800;color:var(--primary)">${fmt(h.farmerShare)}</div></div>
          <div style="background:var(--bg2);border-radius:var(--radius-sm);padding:10px;text-align:center"><div style="font-size:10px;color:var(--muted);font-weight:700">DEBT DEDUCTED</div><div style="font-weight:800;color:var(--danger)">-${fmt(h.farmerDeductedDebt)}</div></div>
        </div>
        <div style="background:var(--primary-dim);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px;text-align:center">
          <div style="font-size:11px;font-weight:700;color:var(--muted)">NET PAYMENT — خالص ادائیگی</div>
          <div style="font-size:22px;font-weight:800;color:${h.farmerNetPayment>=0?'var(--primary)':'var(--danger)'};margin-top:4px">${fmt(h.farmerNetPayment)}</div>
        </div>
      </div></div>`).join('');
}

// Print My Report
window.printMyReport=function(){
  const debts=myActs.filter(a=>a.chargedTo==='farmer');
  const totalDebt=debts.reduce((s,a)=>s+Number(a.amount||0),0);
  const lastHarv=myHarvests.sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>My Record</title><style>body{font-family:Arial,sans-serif;padding:30px;max-width:500px;margin:0 auto;color:#111}h1{color:#16a34a;text-align:center}.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e5e7eb}.income{color:#16a34a;font-weight:700}.expense{color:#dc2626;font-weight:700}.box{background:#f0fdf4;border-radius:8px;padding:14px;margin:16px 0;text-align:center}.title{font-size:20px;font-weight:800}</style></head><body><h1>🌾 FarmLedger — کاشتکار ریکارڈ</h1><p style="text-align:center">${ME.name} (${ME.userId}) • ${new Date().toLocaleDateString()}</p><h2>My Land</h2><div class="row"><span>Land</span><span>${myLand?.name||'—'}</span></div><div class="row"><span>Crop</span><span>${myLand?.crop||'—'}</span></div><div class="row"><span>Acres</span><span>${myLand?.acres||'—'}</span></div><h2>My Debts (اُدھار)</h2>${debts.map(a=>`<div class="row"><span>${a.date} — ${a.type}</span><span class="expense">₨${Number(a.amount||0).toLocaleString()}</span></div>`).join('')||'<p>No debts</p>'}<div class="row"><span><strong>Total Debt</strong></span><span class="expense"><strong>₨${totalDebt.toLocaleString()}</strong></span></div>${lastHarv?`<h2>Latest Harvest</h2><div class="box"><div class="title income">Net Payment</div><div style="font-size:28px;font-weight:800;color:${lastHarv.farmerNetPayment>=0?'#16a34a':'#dc2626'}">₨${Number(lastHarv.farmerNetPayment||0).toLocaleString()}</div><div>${lastHarv.crop} • ${fmtDate(lastHarv.date)}</div></div>`:''}<script>window.onload=()=>setTimeout(()=>window.print(),300);<\/script></body></html>`);
  w.document.close();
};

document.getElementById('logoutBtn').addEventListener('click',async()=>{if(!confirm('Logout?'))return;await signOut(auth);window.location.href='../index.html';});
if('serviceWorker'in navigator)navigator.serviceWorker.register('../sw.js').catch(()=>{});
</script>
</body>
</html>
