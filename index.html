<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FarmLedger V3 — Login</title>
  <meta name="description" content="Farm Management System" />
  <meta name="theme-color" content="#16a34a" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <p class="loading-text" data-i18n="loading">Loading...</p>
</div>

<div class="login-page" id="login-page" style="display:none;">
  <div class="login-card">

    <div class="login-logo">
      <img src="./icons/icon-192.png" alt="FarmLedger" />
      <div>
        <h1>FarmLedger</h1>
        <span>V3 — Farm Management</span>
      </div>
    </div>

    <div class="login-title">
      <h2 data-i18n="welcome">Welcome Back</h2>
      <p>Sign in to manage your farms</p>
    </div>

    <form id="login-form" novalidate>

      <div class="form-group">
        <label for="email" data-i18n="email">Email</label>
        <div class="input-icon">
          <span class="icon">✉</span>
          <input type="email" id="email" placeholder="admin@farmledger.com" required />
        </div>
      </div>

      <div class="form-group">
        <label for="password" data-i18n="password">Password</label>
        <div class="input-icon">
          <span class="icon">🔒</span>
          <input type="password" id="password" placeholder="••••••••" required />
          <button type="button" id="toggle-pw"
            style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1rem;">
            👁
          </button>
        </div>
      </div>

      <div id="login-error" class="form-group" style="display:none;">
        <p style="color:var(--danger);font-size:0.85rem;padding:10px;background:#fee2e2;border-radius:var(--radius-sm);"></p>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="login-btn">
        <span data-i18n="login">Login</span>
      </button>

    </form>

    <div style="margin-top:20px;display:flex;justify-content:center;gap:12px;">
      <button onclick="toggleThemeLocal()" class="btn btn-secondary btn-sm">🌙 Theme</button>
      <button onclick="toggleLangLocal()" class="btn btn-secondary btn-sm">🌐 اردو</button>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script type="module">

  import { initTheme, toggleTheme, initLang, toggleLang, applyLang, showToast } from './js/app.js';
  import { loginUser, redirectIfLoggedIn } from './js/auth.js';

  window.toggleThemeLocal = toggleTheme;

  window.toggleLangLocal = () => {
    toggleLang();
    const btn = document.querySelector('[onclick="toggleLangLocal()"]');
    if (btn) btn.textContent = localStorage.getItem('lang') === 'ur' ? '🌐 English' : '🌐 اردو';
  };

  initTheme();
  initLang();

  const loadingScreen = document.getElementById('loading-screen');
  const loginPage = document.getElementById('login-page');

  redirectIfLoggedIn().then(() => {
    loadingScreen.style.display = 'none';
    loginPage.style.display = 'flex';
  });

  const form = document.getElementById('login-form');
  const errorBox = document.getElementById('login-error');
  const loginBtn = document.getElementById('login-btn');
  const togglePw = document.getElementById('toggle-pw');
  const pwInput = document.getElementById('password');

  togglePw.addEventListener('click', () => {
    pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
  });

  form.addEventListener('submit', async e => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = pwInput.value;

    if (!email || !password) {
      showError('Please enter email and password.');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;"></div> Signing in...';

    try {
      await loginUser(email, password);
    } catch (err) {

      loginBtn.disabled = false;
      loginBtn.innerHTML = '<span data-i18n="login">Login</span>';

      let msg = 'Login failed. Please try again.';

      if (
        err.code === 'auth/user-not-found' ||
        err.code === 'auth/wrong-password' ||
        err.code === 'auth/invalid-credential'
      ) msg = 'Invalid email or password.';
      else if (err.code === 'auth/too-many-requests')
        msg = 'Too many attempts. Please try again later.';
      else if (err.message)
        msg = err.message;

      showError(msg);
    }
  });

  function showError(msg) {
    errorBox.style.display = 'block';
    errorBox.querySelector('p').textContent = msg;
  }

</script>

</body>
</html>
