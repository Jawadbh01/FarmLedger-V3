<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FarmLedger V3 — Login</title>
  <meta name="theme-color" content="#080d08"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle">
  <span id="themeIcon">☀️</span>
  <span id="themeLabel">Light</span>
</button>

<!-- Animated Background -->
<div class="login-bg">
  <div class="login-bg-grid"></div>
</div>

<!-- Login Box -->
<div class="login-page">
  <div class="login-box">

    <!-- Brand -->
    <div class="login-brand">
      <div class="login-logo">🌾</div>
      <div class="login-title">Farm<span>Ledger</span></div>
      <div style="font-size:11px;font-weight:600;color:var(--primary);background:var(--primary-dim);border:1px solid var(--border2);display:inline-block;padding:2px 10px;border-radius:20px;margin-top:6px">V3 — Beta</div>
      <div class="login-subtitle">زمین کا حساب کتاب</div>
    </div>

    <!-- Alert -->
    <div class="alert" id="loginAlert"></div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div class="input-icon-wrap">
        <span class="input-icon">📧</span>
        <input class="form-input" type="email" id="emailInput" placeholder="your@email.com" autocomplete="email"/>
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-icon-wrap">
        <span class="input-icon">🔑</span>
        <input class="form-input" type="password" id="passInput" placeholder="Enter password" autocomplete="current-password"/>
        <button class="toggle-pass" type="button" id="togglePass" tabindex="-1">👁️</button>
      </div>
    </div>

    <!-- Login Button -->
    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      Sign In
    </button>

    <!-- Divider -->
    <div class="divider">or</div>

    <!-- Info -->
    <div style="text-align:center;font-size:12px;color:var(--muted);line-height:1.7">
      Contact your <strong style="color:var(--text)">Admin</strong> to get your account.<br/>
      <span class="urdu" style="font-size:13px">اکاؤنٹ کے لیے ایڈمن سے رابطہ کریں</span>
    </div>

    <!-- Footer -->
    <div style="text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
      <div style="font-size:11px;color:var(--muted)">FarmLedger V3 &nbsp;•&nbsp; Built for Pakistan 🇵🇰</div>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script type="module">
  import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword }
                                     from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, enableIndexedDbPersistence }
                                     from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const app = initializeApp({
    apiKey:            "AIzaSyDpTPibk-7_kqyJdfN94KrLlcKkoNnqIYE",
    authDomain:        "farmledger-e85e3.firebaseapp.com",
    projectId:         "farmledger-e85e3",
    storageBucket:     "farmledger-e85e3.firebasestorage.app",
    messagingSenderId: "922324809308",
    appId:             "1:922324809308:web:05c015ce12e55034e99899"
  });
  const auth = getAuth(app);
  const db   = getFirestore(app);
  try { await enableIndexedDbPersistence(db); } catch {}

  // ── Toast ─────────────────────────────────────
  function toast(msg, type='success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${{success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'}[type]||'✅'}</span><span>${msg}</span>`;
    c.appendChild(t);
    requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
    setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),400);}, 3500);
  }

  // ── Theme ─────────────────────────────────────
  const savedTheme = localStorage.getItem('fl_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  updateThemeBtn(savedTheme);

  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('fl_theme', next);
    updateThemeBtn(next);
  });

  function updateThemeBtn(theme) {
    document.getElementById('themeIcon').textContent  = theme === 'dark' ? '☀️' : '🌙';
    document.getElementById('themeLabel').textContent = theme === 'dark' ? 'Light' : 'Dark';
  }

  // ── Password toggle ───────────────────────────
  document.getElementById('togglePass').addEventListener('click', () => {
    const inp = document.getElementById('passInput');
    const btn = document.getElementById('togglePass');
    if (inp.type === 'password') { inp.type = 'text';     btn.textContent = '🙈'; }
    else                         { inp.type = 'password'; btn.textContent = '👁️'; }
  });

  // ── Enter key ─────────────────────────────────
  ['emailInput','passInput'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); })
  );

  // ── Auth state — redirect if already logged in ─
  onAuthStateChanged(auth, async user => {
    if (!user) return;
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists()) return;
      redirect(snap.data().role);
    } catch {}
  });

  // ── Login ─────────────────────────────────────
  window.doLogin = async function() {
    const email = document.getElementById('emailInput').value.trim();
    const pass  = document.getElementById('passInput').value.trim();
    const alert = document.getElementById('loginAlert');
    const btn   = document.getElementById('loginBtn');

    alert.className = 'alert';
    alert.textContent = '';

    if (!email || !pass) {
      alert.textContent = '⚠️ Please enter email and password';
      alert.className = 'alert error';
      return;
    }

    btn.textContent = '⏳ Signing in...';
    btn.disabled = true;

    try {
      const cred = await signInWithEmailAndPassword(auth, email, pass);
      const snap = await getDoc(doc(db, 'users', cred.user.uid));

      if (!snap.exists()) {
        alert.textContent = '❌ Account not found. Contact admin.';
        alert.className = 'alert error';
        btn.textContent = 'Sign In'; btn.disabled = false;
        return;
      }

      const data = snap.data();

      if (data.status === 'suspended') {
        alert.textContent = '🚫 Your account is suspended. Contact admin.';
        alert.className = 'alert error';
        btn.textContent = 'Sign In'; btn.disabled = false;
        return;
      }

      toast('✅ Welcome back, ' + (data.name||'User') + '!');
      setTimeout(() => redirect(data.role), 800);

    } catch(e) {
      const msgs = {
        'auth/user-not-found':   '❌ No account with this email.',
        'auth/wrong-password':   '❌ Wrong password.',
        'auth/invalid-email':    '❌ Invalid email format.',
        'auth/too-many-requests':'⚠️ Too many attempts. Try again later.',
        'auth/invalid-credential':'❌ Email or password is incorrect.',
      };
      alert.textContent = msgs[e.code] || '❌ ' + e.message;
      alert.className = 'alert error';
      btn.textContent = 'Sign In'; btn.disabled = false;
    }
  };

  function redirect(role) {
    const routes = {
      admin:    'pages/admin.html',
      landlord: 'pages/landlord.html',
      manager:  'pages/manager.html',
      farmer:   'pages/farmer.html',
    };
    window.location.href = routes[role] || 'pages/landlord.html';
  }
</script>
</body>
</html>
