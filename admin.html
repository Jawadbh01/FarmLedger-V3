<script type="module">

import { initTheme, toggleTheme, initLang, toggleLang, showToast, openModal, closeModal, formatCurrency, formatDate } from './js/app.js';
import { guardPage, logoutUser } from './js/auth.js';
import { db } from './js/firebase-config.js';

import {
  collection, getDocs, doc, setDoc, updateDoc,
  query, orderBy, limit, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";


window.openModal = openModal;
window.closeModal = closeModal;
window.toggleThemeLocal = toggleTheme;
window.toggleLangLocal = toggleLang;

initTheme();
initLang();

let currentUser = null;
let allUsers = [];


/* ---------------- AUTH GUARD ---------------- */

guardPage(['admin']).then(({ userData }) => {

  currentUser = userData;

  document.getElementById('user-name').textContent = userData.name || 'Admin';
  document.getElementById('user-avatar').textContent =
    (userData.name || 'A')[0].toUpperCase();

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  loadUsers();
  loadDashboard();

}).catch(() => {});


/* ---------------- LOGOUT ---------------- */

window.handleLogout = async () => {
  await logoutUser();
  window.location.href = './index.html';
};


/* ---------------- SIDEBAR ---------------- */

window.openSidebar = () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('active');
};

window.closeSidebar = () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('active');
};


/* ---------------- SECTION SWITCH ---------------- */

window.openSection = (section) => {

  document.querySelectorAll('[id^="section-"]').forEach(s=>{
    s.style.display='none';
  });

  document.getElementById('section-'+section).style.display='block';

};


/* ---------------- DASHBOARD ---------------- */

async function loadDashboard(){

  try{

    const farmsSnap = await getDocs(collection(db,'farms'));
    const farmersSnap = await getDocs(collection(db,'farmers'));
    const inventorySnap = await getDocs(collection(db,'inventory'));

    document.getElementById('stat-farms').textContent = farmsSnap.size;
    document.getElementById('stat-farmers').textContent = farmersSnap.size;

    let inventoryValue = 0;

    inventorySnap.forEach(d=>{
      const item = d.data();
      inventoryValue += (item.price||0)*(item.quantity||0);
    });

    document.getElementById('stat-inventory').textContent =
      formatCurrency(inventoryValue);

  }catch(e){

    console.error(e);

  }

}


/* ---------------- USERS ---------------- */

async function loadUsers(){

  try{

    const snap = await getDocs(collection(db,'users'));

    allUsers = snap.docs.map(d=>({
      id:d.id,
      ...d.data()
    }));

    renderUsers(allUsers);

  }catch(e){

    console.error(e);

  }

}


function renderUsers(users){

  const tbody = document.getElementById('users-table');

  if(!users.length){

    tbody.innerHTML =
      '<tr><td colspan="5">No Users Found</td></tr>';

    return;

  }

  tbody.innerHTML = users.map(u=>`

<tr>

<td>${u.name||'-'}</td>

<td>${u.email||'-'}</td>

<td>${u.role||'-'}</td>

<td>${u.status||'-'}</td>

<td>

<button onclick="toggleUserStatus('${u.id}','${u.status}')">

${u.status==='active'?'Suspend':'Activate'}

</button>

</td>

</tr>

`).join('');

}


/* ---------------- USER STATUS ---------------- */

window.toggleUserStatus = async(uid,current)=>{

  const newStatus = current==='active'?'suspended':'active';

  await updateDoc(doc(db,'users',uid),{

    status:newStatus

  });

  loadUsers();

};


/* ---------------- FIREBASE SECONDARY APP ---------------- */

const secondaryApp = initializeApp({

  apiKey: "AIzaSyDpTPibk-7_kqyJdfN94KrLlcKkoNnqIYE",
  authDomain: "farmledger-e85e3.firebaseapp.com",
  projectId: "farmledger-e85e3",
  storageBucket: "farmledger-e85e3.firebasestorage.app",
  messagingSenderId: "922324809308",
  appId: "1:922324809308:web:05c015ce12e55034e99899"

}, 'secondary');


const secondaryAuth = getAuth(secondaryApp);


/* ---------------- ADD USER ---------------- */

window.submitAddUser = async()=>{

  const name=document.getElementById('new-name').value.trim();
  const email=document.getElementById('new-email').value.trim();
  const password=document.getElementById('new-password').value;
  const phone=document.getElementById('new-phone').value.trim();
  const role=document.getElementById('new-role').value;

  if(!name||!email||!password||!role){

    showToast('Fill all fields','error');
    return;

  }

  try{

    const cred =
      await createUserWithEmailAndPassword(
        secondaryAuth,email,password
      );

    const uid = cred.user.uid;

    await setDoc(doc(db,'users',uid),{

      uid,
      name,
      email,
      phone,
      role,
      status:'active',
      createdAt:serverTimestamp(),
      createdBy:currentUser.uid

    });

    await secondaryAuth.signOut();

    showToast('User Created','success');

    closeModal('add-user-modal');

    document.getElementById('add-user-form').reset();

    loadUsers();

  }catch(err){

    console.error(err);

    showToast('Failed to create user','error');

  }

};

</script>
